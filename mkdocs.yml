site_name: WEPWolf
site_description: Offline, passive WEP key recovery from 802.11 captures -- a faster, parity-or-better alternative to aircrack-ng.
site_url: https://strongwind1.github.io/WEPWolf/
repo_url: https://github.com/StrongWind1/WEPWolf
repo_name: StrongWind1/WEPWolf

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    # Dark mode (default) -- respects system preference
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Light mode -- respects system preference
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - header.autohide
    - announce.dismiss
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - pymdownx.keys
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: getting-started/installation.md
  - Guide:
      - Overview: guide/index.md
      - How it works: guide/how-it-works.md
      - The attacks: guide/attacks.md
      - Output & diagnostics: guide/output.md
      - Tuning & performance: guide/tuning.md
  - CLI Reference: reference/cli.md
  - WEPWolf vs aircrack-ng: comparison.md
  - FAQ: faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/StrongWind1/WEPWolf
      name: WEPWolf on GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

strict: true
