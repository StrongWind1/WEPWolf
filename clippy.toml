# Clippy configuration  --  strictest settings.
#
# Lint levels are declared in Cargo.toml [lints.*]. This file only tunes
# per-lint thresholds and the small set of test-only relaxations that keep
# integration test files readable without loosening production-code rules.

# --- Complexity thresholds ---------------------------------------------------
# Tuned for protocol-parsing code: frame and IV extraction handlers thread many
# store and log parameters through a linear pipeline, and CLI/protocol flag
# structs carry a wide set of independent bools. Generous thresholds keep those
# shapes free of per-call-site #[allow] annotations that would document design
# choices rather than suppress real problems.
cognitive-complexity-threshold          = 30
too-many-arguments-threshold            = 18
too-many-lines-threshold                = 500
type-complexity-threshold               = 500
max-struct-bools                        = 20
max-fn-params-bools                     = 10

# --- Test-only relaxations -----------------------------------------------------
# Tests deliberately panic on invariant violations  --  that's the assertion.
# Suppressing these in production while permitting them in tests is the right
# split. Requires Clippy >= 1.82; wepwolf MSRV is 1.95 so safe.
allow-expect-in-tests           = true
allow-unwrap-in-tests           = true
# Test fixtures build slices of known length from byte literals; `slice.get(..)`
# gymnastics add noise without catching any real bug.
allow-indexing-slicing-in-tests = true
# Tests that craft protocol headers routinely panic on malformed input; that
# is how the property "this parser rejects garbage" is expressed.
allow-panic-in-tests            = true
